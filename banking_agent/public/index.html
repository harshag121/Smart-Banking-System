<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Bank - AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 700px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .chat-header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .status {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4CAF50;
            border-radius: 50%;
            margin-right: 5px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
        }
        
        .message.bot .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .message.user .message-content {
            background: #2a5298;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            margin: 0 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .message.bot .avatar {
            background: #e3f2fd;
        }
        
        .message.user .avatar {
            background: #2a5298;
            color: white;
        }
        
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            padding-left: 45px;
        }
        
        .suggestion-btn {
            background: white;
            border: 1px solid #2a5298;
            color: #2a5298;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .suggestion-btn:hover {
            background: #2a5298;
            color: white;
        }
        
        .chat-input {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }
        
        .input-container {
            display: flex;
            gap: 10px;
        }
        
        input[type="text"] {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus {
            border-color: #2a5298;
        }
        
        button {
            background: #2a5298;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #1e3c72;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: white;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            width: fit-content;
            margin-left: 45px;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        
        .quick-actions {
            display: flex;
            gap: 10px;
            padding: 10px 20px;
            background: white;
            overflow-x: auto;
        }
        
        .quick-btn {
            background: #f0f4f8;
            border: 1px solid #d0d7de;
            color: #2a5298;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
        }
        
        .quick-btn:hover {
            background: #2a5298;
            color: white;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🏦 Demo Bank Assistant</h1>
            <p><span class="status"></span>Online | Secure Demo Environment</p>
        </div>
        
        <div class="quick-actions">
            <button class="quick-btn" onclick="sendQuick('Check my balance')">💰 Balance</button>
            <button class="quick-btn" onclick="sendQuick('Transfer money')">💸 Transfer</button>
            <button class="quick-btn" onclick="sendQuick('Show transactions')">📊 History</button>
            <button class="quick-btn" onclick="sendQuick('Help')">❓ Help</button>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <!-- Messages will appear here -->
        </div>
        
        <div class="chat-input">
            <div class="input-container">
                <input type="text" id="userInput" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()" id="sendBtn">Send</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION - Replace with your Dialogflow details
        const CONFIG = {
            projectId: 'YOUR_PROJECT_ID',  // Replace with your GCP project ID
            sessionId: 'demo-session-' + Date.now(),
            languageCode: 'en-US',
            // Using Dialogflow REST API directly (no auth needed for demo if you set up properly)
            apiEndpoint: 'https://dialogflow.googleapis.com/v2/projects/YOUR_PROJECT_ID/agent/sessions/'
        };

        let sessionId = 'demo-session-' + Date.now();
        
        // Initialize chat
        window.onload = function() {
            addMessage('bot', 'Welcome to Demo Bank! 🏦\n\nI can help you:\n• Check account balances\n• Transfer money between accounts\n• View recent transactions\n\nHow can I assist you today?');
            showSuggestions(['Check Balance', 'Transfer Money', 'Transactions', 'Help']);
        };

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function sendQuick(text) {
            document.getElementById('userInput').value = text;
            sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Add user message
            addMessage('user', message);
            input.value = '';
            
            // Show typing indicator
            showTyping();
            
            try {
                // For demo purposes, we'll simulate responses if Dialogflow isn't set up yet
                // Replace this with actual API call when ready
                const response = await simulateDialogflowResponse(message);
                
                hideTyping();
                addMessage('bot', response.text);
                
                if (response.suggestions) {
                    showSuggestions(response.suggestions);
                }
            } catch (error) {
                hideTyping();
                addMessage('bot', 'Sorry, I encountered an error. Please try again.');
                console.error(error);
            }
        }

        // SIMULATION MODE - Replace with real Dialogflow integration
        async function simulateDialogflowResponse(message) {
            const lowerMsg = message.toLowerCase();
            
            // Simulate network delay
            await new Promise(resolve => setTimeout(resolve, 800));
            
            // Check Balance
            if (lowerMsg.includes('balance') || lowerMsg.includes('how much')) {
                if (lowerMsg.includes('savings')) {
                    return {
                        text: 'Your savings account (****7891) balance is:\n\n💎 **$12,750.00**',
                        suggestions: ['Transfer Money', 'View Transactions', 'Check Checking']
                    };
                } else if (lowerMsg.includes('checking')) {
                    return {
                        text: 'Your checking account (****4532) balance is:\n\n💰 **$2,547.83**',
                        suggestions: ['Transfer Money', 'View Transactions', 'Check Savings']
                    };
                } else {
                    return {
                        text: 'Here are your account balances:\n\n🏦 **Checking** (****4532): $2,547.83\n💎 **Savings** (****7891): $12,750.00\n\nTotal: $15,297.83',
                        suggestions: ['Transfer Money', 'Transaction History', 'Help']
                    };
                }
            }
            
            // Transfer Money
            if (lowerMsg.includes('transfer') || lowerMsg.includes('send') || lowerMsg.includes('move')) {
                return {
                    text: 'I can help you transfer money. Please provide:\n\n1. Amount to transfer\n2. From which account (checking/savings)\n3. To which account (checking/savings)\n\nExample: "Transfer $100 from checking to savings"',
                    suggestions: ['Transfer $50 to savings', 'Transfer $200 to checking', 'Cancel']
                };
            }
            
            // Transaction History
            if (lowerMsg.includes('transaction') || lowerMsg.includes('history') || lowerMsg.includes('spent')) {
                return {
                    text: '📊 **Recent Checking Transactions:**\n\n💸 2026-04-08 - Grocery Store\n   -$87.43\n\n💵 2026-04-07 - Salary Deposit\n   +$3,200.00\n\n💸 2026-04-06 - Electric Bill\n   -$124.50\n\n💸 2026-04-05 - Coffee Shop\n   -$5.60\n\n💵 2026-04-04 - Transfer from Savings\n   +$500.00\n\nCurrent Balance: $2,547.83',
                    suggestions: ['Check Savings', 'Transfer Money', 'Help']
                };
            }
            
            // Help
            if (lowerMsg.includes('help') || lowerMsg.includes('what can you do') || lowerMsg.includes('support')) {
                return {
                    text: "Here's what I can help you with:\n\n💰 **Check Balance** - Say 'What's my balance?' or 'Check my savings'\n💸 **Transfer Money** - Say 'Transfer $100 from checking to savings'\n📊 **Transaction History** - Say 'Show my recent transactions'\n❓ **Help** - Show this message\n\nWhat would you like to do?",
                    suggestions: ['Check Balance', 'Transfer Money', 'Transactions']
                };
            }
            
            // Confirm/Yes
            if (lowerMsg.includes('yes') || lowerMsg.includes('confirm')) {
                return {
                    text: '✅ **Transfer Successful!**\n\n$100.00 has been transferred from your checking to your savings account.\n\nNew Balances:\n• Checking: $2,447.83\n• Savings: $12,850.00',
                    suggestions: ['Check Balance', 'Another Transfer', 'Transaction History']
                };
            }
            
            // Default fallback
            return {
                text: "I'm not sure I understand. Try saying:\n• 'Check my balance'\n• 'Transfer $100 to savings'\n• 'Show my transactions'\n• 'Help'",
                suggestions: ['Help', 'Check Balance', 'Transfer Money']
            };
        }

        function addMessage(sender, text) {
            const container = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const avatar = sender === 'bot' ? '🤖' : '👤';
            const formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
            
            messageDiv.innerHTML = `
                ${sender === 'bot' ? `<div class="avatar">${avatar}</div>` : ''}
                <div class="message-content">${formattedText}</div>
                ${sender === 'user' ? `<div class="avatar">${avatar}</div>` : ''}
            `;
            
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        function showSuggestions(suggestions) {
            const container = document.getElementById('chatMessages');
            const suggestionsDiv = document.createElement('div');
            suggestionsDiv.className = 'suggestions';
            
            suggestions.forEach(text => {
                const btn = document.createElement('button');
                btn.className = 'suggestion-btn';
                btn.textContent = text;
                btn.onclick = () => sendQuick(text);
                suggestionsDiv.appendChild(btn);
            });
            
            container.appendChild(suggestionsDiv);
            container.scrollTop = container.scrollHeight;
        }

        function showTyping() {
            const container = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            `;
            container.appendChild(typingDiv);
            container.scrollTop = container.scrollHeight;
        }

        function hideTyping() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        // REAL DIALOGFLOW INTEGRATION (Uncomment when ready)
        /*
        async function callDialogflow(message) {
            const response = await fetch(`https://dialogflow.googleapis.com/v2/projects/${CONFIG.projectId}/agent/sessions/${sessionId}:detectIntent`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + await getAccessToken()
                },
                body: JSON.stringify({
                    queryInput: {
                        text: {
                            text: message,
                            languageCode: CONFIG.languageCode
                        }
                    }
                })
            });
            
            const data = await response.json();
            return {
                text: data.queryResult.fulfillmentText,
                suggestions: data.queryResult.fulfillmentMessages
                    .filter(m => m.platform === 'PLATFORM_UNSPECIFIED' && m.suggestions)
                    .flatMap(m => m.suggestions.suggestions.map(s => s.title))
            };
        }
        */
    </script>
</body>
</html>
